<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>York Chuang</title>

<style>

:root{
  --bg:#ffffff;
  --text:#111111;
  --subtle:#666666;
  --card:#f5f5f5;
}

body.dark{
  --bg:#0f0f10;
  --text:#ffffff;
  --subtle:#9a9a9a;
  --card:#1b1b1d;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  transition:background .35s ease,color .35s ease;
}

.container{
  max-width:650px;
  padding:40px;
  animation:fadeUp .9s ease;
}

h1{
  font-size:56px;
  margin:0 0 10px 0;
  letter-spacing:-1px;
}

.subtitle{
  font-size:18px;
  color:var(--subtle);
}

.name{
  margin-top:35px;
  font-size:14px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--subtle);
}

.toggle{
  position:fixed;
  top:25px;
  right:25px;
  width:46px;
  height:46px;
  border-radius:50%;
  border:none;
  background:var(--card);
  cursor:pointer;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .2s ease,background .3s ease;
}

.toggle:hover{
  transform:scale(1.08);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>

</head>

<body>

<button class="toggle" onclick="toggleTheme()">🌙</button>

<div class="container">
  <h1>Coming Soon</h1>
  <div class="subtitle">
    A personal website is currently under construction.
  </div>
  <p>
  <a href="https://linkedin.com/in/yorkchuang">LinkedIn</a>
</p>

  <div class="name">
    York Chuang
  </div>
</div>

<script>

function applyTheme(theme){
  const toggle=document.querySelector(".toggle")

  if(theme==="dark"){
    document.body.classList.add("dark")
    toggle.textContent="☀️"
  }else{
    document.body.classList.remove("dark")
    toggle.textContent="🌙"
  }

  localStorage.setItem("theme",theme)
}

function toggleTheme(){
  const isDark=document.body.classList.contains("dark")
  applyTheme(isDark?"light":"dark")
}

function initTheme(){
  const saved=localStorage.getItem("theme")

  if(saved){
    applyTheme(saved)
    return
  }

  const prefersDark=window.matchMedia("(prefers-color-scheme: dark)").matches
  applyTheme(prefersDark?"dark":"light")
}

initTheme()

</script>

</body>
</html>
